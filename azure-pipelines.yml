trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    persistCredentials: true
    fetchDepth: 0

  - script: |
      git config user.email "greatanthony23@gmail.com"
      git config user.name "greatemmet"
      git remote add github https://$GITHUB_TOKEN@github.com/GREATEMMET/Fabric_Analytical_Pipeline_project1.git
      git push github HEAD:refs/heads/main --force

    displayName: "Mirror to GitHub"
    env:
      GITHUB_TOKEN: $(GITHUB_TOKEN)